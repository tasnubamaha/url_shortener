<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern URL Shortener</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
      overflow: hidden;
      color: white;
    }

    .bg-blur {
      position: absolute;
      width: 500px;
      height: 500px;
      background: #3b82f6;
      border-radius: 50%;
      filter: blur(150px);
      opacity: 0.25;
      top: -100px;
      left: -100px;
    }

    .bg-blur2 {
      position: absolute;
      width: 400px;
      height: 400px;
      background: #8b5cf6;
      border-radius: 50%;
      filter: blur(150px);
      opacity: 0.25;
      bottom: -100px;
      right: -100px;
    }

    .container {
      width: 90%;
      max-width: 520px;
      padding: 35px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      position: relative;
      z-index: 10;
    }

    .title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    .input-box {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 1rem;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
    }

    input::placeholder {
      color: #cbd5e1;
    }

    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 12px rgba(96,165,250,0.4);
    }

    button {
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(59,130,246,0.3);
    }

    .result {
      margin-top: 25px;
      padding: 18px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .result p {
      margin-bottom: 10px;
      color: #cbd5e1;
      font-size: 0.95rem;
    }

    .short-url {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .short-url a {
      color: #60a5fa;
      text-decoration: none;
      word-break: break-all;
      font-weight: 500;
    }

    .copy-btn {
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 0.9rem;
      background: rgba(255,255,255,0.1);
    }

    .copy-btn:hover {
      background: rgba(255,255,255,0.18);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media(max-width: 500px) {
      .container {
        padding: 25px;
      }

      .title {
        font-size: 1.7rem;
      }
    }
  </style>
</head>

<body>

  <div class="bg-blur"></div>
  <div class="bg-blur2"></div>

  <div class="container">
    <h1 class="title">URL Shortener</h1>
    <p class="subtitle">Transform long messy links into clean modern short URLs.</p>

    <div class="input-box">
      <input 
        type="text" 
        id="urlInput" 
        placeholder="Paste your long URL here..." 
      />

      <button onclick="shortenURL()">Shorten URL</button>
    </div>

    <div class="result" id="resultBox">
      <p>Your shortened URL:</p>

      <div class="short-url">
        <a href="#" target="_blank" id="shortLink"></a>

        <button class="copy-btn" onclick="copyURL()">
          Copy
        </button>
      </div>
    </div>
  </div>

  <script>
    async function shortenURL() {
      const urlInput = document.getElementById("urlInput").value;
      const resultBox = document.getElementById("resultBox");
      const shortLink = document.getElementById("shortLink");

      if (!urlInput) {
        alert("Please enter a URL.");
        return;
      }

      try {
        const response = await fetch(
          `https://tinyurl.com/api-create.php?url=${encodeURIComponent(urlInput)}`
        );

        const shortUrl = await response.text();

        shortLink.href = shortUrl;
        shortLink.innerText = shortUrl;

        resultBox.style.display = "block";

      } catch (error) {
        alert("Something went wrong.");
      }
    }

    function copyURL() {
      const shortLink = document.getElementById("shortLink").innerText;

      navigator.clipboard.writeText(shortLink);

      alert("Copied to clipboard!");
    }
  </script>

</body>
</html>
